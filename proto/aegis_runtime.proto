// AEGIS Runtime Service Protocol
// gRPC service definition for communication between TypeScript Temporal Worker and Rust Runtime
syntax = "proto3";

package aegis.runtime.v1;

// =============================================================================
// AEGIS Runtime Service
// Exposes agent execution, validation, and system operations
// =============================================================================

service AegisRuntime {
  // Execute an agent with 100monkeys iterative refinement
  rpc ExecuteAgent(ExecuteAgentRequest) returns (stream ExecutionEvent);
  
  // Execute a system command
  rpc ExecuteSystemCommand(ExecuteSystemCommandRequest) returns (ExecuteSystemCommandResponse);
  
  // Validate output using gradient scoring (judge agents)
  rpc ValidateWithJudges(ValidateRequest) returns (ValidateResponse);
  
  // Attest an agent to receive a SEAL Security Token
  rpc AttestAgent(AttestAgentRequest) returns (AttestAgentResponse);
  
  // Invoke a tool via orchestrator mediation (SEAL)
  rpc InvokeTool(InvokeToolRequest) returns (InvokeToolResponse);

  // Ingest a stimulus and trigger the appropriate workflow.
  // Auth: IAM/OIDC JWT in gRPC metadata key "authorization: Bearer {jwt}".
  rpc IngestStimulus(IngestStimulusRequest) returns (IngestStimulusResponse);

  // Execute a deterministic CI/CD container step (ADR-050).
  // No LLM loop — runs the specified image with the given command and returns
  // exit code, stdout, and stderr when the container exits.
  rpc ExecuteContainerRun(ExecuteContainerRunRequest) returns (ExecuteContainerRunResponse);

  // Search for agents matching a natural-language query (ADR-075).
  // Scoped to the caller's tenant; optionally includes platform templates.
  rpc SearchAgents(SearchAgentsRequest) returns (SearchAgentsResponse);

  // Search for workflows matching a natural-language query (ADR-075).
  // Scoped to the caller's tenant; optionally includes platform templates.
  rpc SearchWorkflows(SearchWorkflowsRequest) returns (SearchWorkflowsResponse);

  // Create an ephemeral workspace volume for the intent-to-execution pipeline (ADR-087).
  rpc CreateWorkspaceVolume(CreateWorkspaceVolumeRequest) returns (CreateWorkspaceVolumeResponse);

  // Destroy a workspace volume after pipeline completion or failure (ADR-087).
  rpc DestroyWorkspaceVolume(DestroyWorkspaceVolumeRequest) returns (DestroyWorkspaceVolumeResponse);
}

// =============================================================================
// ExecuteAgent RPC
// =============================================================================

message ExecuteAgentRequest {
  string agent_id = 1;
  string input = 2;
  string context_json = 3;
  optional SecurityPolicy security_policy = 4;
  optional string workflow_execution_id = 5; // Link to workflow execution
  optional string parent_execution_id = 6; // Nested Judge Executions
  // Tenant slug derived from the caller's JWT; used for tenant-scoped isolation,
  // storage paths, and Cortex partitioning.
  string tenant_id = 7;
  // Named security context from the SecurityPolicy registry; when set, the
  // runtime resolves the full SecurityPolicy from this name instead of using
  // the inline security_policy field.
  optional string security_context_name = 8;
}

message ExecutionEvent {
  oneof event {
    ExecutionStarted execution_started = 1;
    IterationStarted iteration_started = 2;
    IterationOutput iteration_output = 3;
    IterationCompleted iteration_completed = 4;
    IterationFailed iteration_failed = 5;
    RefinementApplied refinement_applied = 6;
    ExecutionCompleted execution_completed = 7;
    ExecutionFailed execution_failed = 8;
  }
}

message ExecutionStarted {
  string execution_id = 1;
  string agent_id = 2;
  string started_at = 3; // ISO 8601 timestamp
}

message IterationStarted {
  string execution_id = 1;
  uint32 iteration_number = 2;
  string action = 3;
  string started_at = 4;
}

message IterationOutput {
  string execution_id = 1;
  uint32 iteration_number = 2;
  string output = 3;
}

message IterationCompleted {
  string execution_id = 1;
  uint32 iteration_number = 2;
  string output = 3;
  string completed_at = 4;
}

message IterationFailed {
  string execution_id = 1;
  uint32 iteration_number = 2;
  IterationError error = 3;
  string failed_at = 4;
}

message IterationError {
  string error_type = 1;
  string message = 2;
  optional string stacktrace = 3;
}

message RefinementApplied {
  string execution_id = 1;
  uint32 iteration_number = 2;
  string code_diff = 3;
  string applied_at = 4;
}

message ExecutionCompleted {
  string execution_id = 1;
  string final_output = 2;
  uint32 total_iterations = 3;
  string completed_at = 4;
}

message ExecutionFailed {
  string execution_id = 1;
  string reason = 2;
  uint32 total_iterations = 3;
  string failed_at = 4;
}

message SecurityPolicy {
  NetworkPolicy network_policy = 1;
  FilesystemPolicy filesystem_policy = 2;
  ResourceLimits resource_limits = 3;
}

message NetworkPolicy {
  repeated string allowed_domains = 1;
  repeated string blocked_domains = 2;
}

message FilesystemPolicy {
  repeated string read_paths = 1;
  repeated string write_paths = 2;
}

message ResourceLimits {
  uint32 cpu_millicores = 1;
  uint64 memory_bytes = 2;
  uint32 timeout_seconds = 3;
}

// =============================================================================
// ExecuteSystemCommand RPC
// =============================================================================

message ExecuteSystemCommandRequest {
  string command = 1;
  map<string, string> env = 2;
  optional string workdir = 3;
  optional uint32 timeout_seconds = 4;
}

message ExecuteSystemCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  uint64 duration_ms = 4;
}

// =============================================================================
// ValidateWithJudges RPC
// =============================================================================

message ValidateRequest {
  string output = 1;
  string task = 2;
  repeated JudgeConfig judges = 3;
  ConsensusConfig consensus = 4;
  string context_json = 5;
}

message JudgeConfig {
  string agent_id = 1;
  string input_template = 2;
  float weight = 3;
}

message ConsensusConfig {
  enum Strategy {
    WEIGHTED_AVERAGE = 0;
    MAJORITY_VOTE = 1;
    UNANIMOUS = 2;
    ANY_APPROVED = 3;
  }
  Strategy strategy = 1;
  optional float threshold = 2;
  optional float agreement = 3;
  optional uint32 n = 4;
}

message ValidateResponse {
  float score = 1; // 0.0 - 1.0
  float confidence = 2; // 0.0 - 1.0
  string reasoning = 3;
  bool binary_valid = 4;
  repeated JudgeResult individual_results = 5;
}

message JudgeResult {
  string judge_id = 1;
  float score = 2;
  float confidence = 3;
  string reasoning = 4;
}

// =============================================================================
// SEAL / MCP Routing RPCs
// =============================================================================

message AttestAgentRequest {
  string agent_id = 1;
  string execution_id = 2;
  string container_id = 3;
  string public_key_pem = 4;
  // Tenant slug; embedded in the issued SEAL security token for downstream
  // tenant-scoped tool access enforcement.
  string tenant_id = 5;
}

message AttestAgentResponse {
  string security_token = 1;
}

message InvokeToolRequest {
  string security_token = 1;
  string signature = 2;
  bytes inner_mcp = 3; // The JSON-RPC payload representing the MCP tool call
}

message InvokeToolResponse {
  bytes result_json = 1; // Success or failure JSON result wrapped
}

// =============================================================================
// IngestStimulus RPC
// =============================================================================

// Ingest an external or internal stimulus and route it to the correct workflow.
// The source_name is matched against the WorkflowRegistry direct routing table;
// if no direct match is found, the RouterAgent LLM classifier is invoked.
message IngestStimulusRequest {
  // Routing key — matches a WorkflowRegistry direct route or "http_api" for LLM path.
  string source_name = 1;
  // Raw stimulus payload: natural language, JSON body, or other string content.
  string content = 2;
  // Optional idempotency key for exactly-once processing within the 24h TTL window.
  // An empty string disables deduplication for this request.
  string idempotency_key = 3;
  // Forwarded HTTP headers for context (e.g. X-GitHub-Event, X-Stripe-Signature).
  map<string, string> headers = 4;
  // Tenant slug derived from the caller's JWT; scopes the stimulus and any
  // resulting workflow execution to the identified tenant.
  string tenant_id = 5;
}

message IngestStimulusResponse {
  // UUID of the Stimulus value object created for this ingestion.
  string stimulus_id = 1;
  // UUID of the WorkflowExecution started by routing this stimulus.
  string workflow_execution_id = 2;
}

// =============================================================================
// ExecuteContainerRun RPC (ADR-050)
// =============================================================================

/// A named volume mount for a container step.
message ContainerVolumeMount {
  // Logical name matching the volume declared in the workflow manifest.
  string name = 1;
  // Absolute path inside the container where the volume is mounted.
  string mount_path = 2;
  // Whether the volume is mounted read-only.
  bool read_only = 3;
}

/// Resource limits applied to a container step.
message ContainerResourceLimits {
  // CPU in millicores (e.g. 500 = 0.5 CPU). 0 = unlimited.
  uint32 cpu_millicores = 1;
  // Memory limit string (e.g. "512m", "2g"). Empty = unlimited.
  string memory = 2;
  // Wall-clock timeout for the step (e.g. "30s", "5m"). Empty = no timeout.
  string timeout = 3;
}

message ExecuteContainerRunRequest {
  // UUID of the parent workflow execution.
  string execution_id = 1;
  // Logical name of this step (used in events and logs).
  string name = 2;
  // Fully-qualified container image reference (e.g. "python:3.11-slim").
  string image = 3;
  // Image pull policy: "always", "if_not_present", or "never".
  string image_pull_policy = 4;
  // Command to run inside the container.
  repeated string command = 5;
  // Environment variables to inject (key=value pairs).
  map<string, string> env = 6;
  // Working directory inside the container. Empty = image default.
  string workdir = 7;
  // Volume mounts to apply.
  repeated ContainerVolumeMount volumes = 8;
  // Optional resource limits.
  ContainerResourceLimits resources = 9;
  // Optional registry credential reference (secret-store path).
  string registry_credentials = 10;
  // If true, wrap command in "sh -c" to enable shell operators.
  bool shell = 11;
  // Name of the workflow state that triggered this step.
  string state_name = 12;
  // Maximum number of attempts for this step (1 = no retry).
  uint32 max_attempts = 13;
  // Tenant slug; used for tenant-scoped volume paths and resource accounting.
  string tenant_id = 14;
}

message ExecuteContainerRunResponse {
  // Exit code returned by the container process.
  int32 exit_code = 1;
  // Captured stdout (truncated to 1 MiB).
  string stdout = 2;
  // Captured stderr (truncated to 1 MiB).
  string stderr = 3;
  // Wall-clock duration of the step in milliseconds.
  uint64 duration_ms = 4;
  // Number of attempts consumed (1 = succeeded on first try).
  uint32 attempts = 5;
}

// =============================================================================
// SearchAgents / SearchWorkflows RPCs (ADR-075)
// =============================================================================

message SearchAgentsRequest {
  string tenant_id = 1;
  string query = 2;
  uint32 limit = 3;
  double min_score = 4;
  map<string, string> label_filters = 5;
  string status_filter = 6;
  bool include_platform_templates = 7;
}

message SearchAgentsResponse {
  repeated DiscoveryResultProto results = 1;
  uint64 total_indexed = 2;
  uint64 query_time_ms = 3;
  string search_mode = 4;
}

message SearchWorkflowsRequest {
  string tenant_id = 1;
  string query = 2;
  uint32 limit = 3;
  double min_score = 4;
  map<string, string> label_filters = 5;
  bool include_platform_templates = 6;
}

message SearchWorkflowsResponse {
  repeated DiscoveryResultProto results = 1;
  uint64 total_indexed = 2;
  uint64 query_time_ms = 3;
  string search_mode = 4;
}

message DiscoveryResultProto {
  string resource_id = 1;
  string kind = 2;
  string name = 3;
  string version = 4;
  string description = 5;
  map<string, string> labels = 6;
  double similarity_score = 7;
  double relevance_score = 8;
  string tenant_id = 9;
  string updated_at = 10;
  bool is_platform_template = 11;
}

// =============================================================================
// CreateWorkspaceVolume RPC (ADR-087)
// =============================================================================

message CreateWorkspaceVolumeRequest {
  // Workflow execution ID that owns this workspace volume.
  string workflow_execution_id = 1;
  // Tenant slug for volume isolation.
  string tenant_id = 2;
  // TTL in hours for ephemeral workspace volumes.
  uint32 ttl_hours = 3;
  // Size limit in MB (0 = default quota).
  uint64 size_limit_mb = 4;
}

message CreateWorkspaceVolumeResponse {
  // The provisioned volume ID.
  string volume_id = 1;
  // NFS remote path for mounting into containers.
  string remote_path = 2;
}

// =============================================================================
// DestroyWorkspaceVolume RPC (ADR-087)
// =============================================================================

message DestroyWorkspaceVolumeRequest {
  // The volume ID to destroy.
  string volume_id = 1;
  // Workflow execution ID that owns this volume (for ownership verification).
  string workflow_execution_id = 2;
}

message DestroyWorkspaceVolumeResponse {
  // Whether the volume was successfully destroyed.
  bool destroyed = 1;
}
