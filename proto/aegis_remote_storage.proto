// AEGIS Remote Storage Service Protocol
// gRPC service definition for cross-node POSIX file operations (ADR-064).
// All RPCs except HealthCheck path-based operations require SMCP node
// authentication via SmcpNodeEnvelope. The host node executes authoritative
// AegisFSAL checks before delegating to the local StorageProvider.
//
// Port: 50056 (shared with NodeClusterService)
// Auth: SmcpNodeEnvelope bearing a valid node_security_token.
syntax = "proto3";

package aegis.storage.v1;

option java_multiple_files = true;
option java_package = "ai.hundredmonkeys.aegis.storage.v1";
option java_outer_classname = "AegisRemoteStorageProto";
option go_package = "github.com/100monkeys-ai/aegis-proto/gen/go/storage/v1;storagev1";

import "aegis_cluster.proto";

// Remote storage service for cross-node volume access (ADR-064).
// All RPCs require SMCP node authentication via SmcpNodeEnvelope.
// The host node executes authoritative AegisFSAL checks.
service RemoteStorageService {
  rpc CreateDirectory(RemoteStorageRequest) returns (RemoteStorageResponse);
  rpc DeleteDirectory(RemoteStorageRequest) returns (RemoteStorageResponse);
  rpc SetQuota(SetQuotaRequest) returns (RemoteStorageResponse);
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);
  rpc OpenFile(OpenFileRequest) returns (OpenFileResponse);
  rpc ReadAt(ReadAtRequest) returns (ReadAtResponse);
  rpc WriteAt(WriteAtRequest) returns (WriteAtResponse);
  rpc CloseFile(CloseFileRequest) returns (RemoteStorageResponse);
  rpc Stat(RemoteStorageRequest) returns (StatResponse);
  rpc Readdir(RemoteStorageRequest) returns (ReaddirResponse);
  rpc CreateFile(CreateFileRequest) returns (OpenFileResponse);
  rpc DeleteFile(RemoteStorageRequest) returns (RemoteStorageResponse);
  rpc Rename(RenameRequest) returns (RemoteStorageResponse);
  rpc HealthCheck(HealthCheckRequest) returns (RemoteStorageResponse);
}

// Common request wrapper with SMCP authentication and path
message RemoteStorageRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string path = 3;
}

message RemoteStorageResponse {
  bool success = 1;
  string error_message = 2;
}

message SetQuotaRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string path = 3;
  uint64 bytes = 4;
}

message GetUsageRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string path = 3;
}

message GetUsageResponse {
  uint64 bytes_used = 1;
}

message OpenFileRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string path = 3;
  int32 mode = 4; // 0=ReadOnly, 1=WriteOnly, 2=ReadWrite, 3=Create
}

message OpenFileResponse {
  bytes file_handle = 1;
}

message ReadAtRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  bytes file_handle = 3;
  uint64 offset = 4;
  uint32 length = 5;
}

message ReadAtResponse {
  bytes data = 1;
}

message WriteAtRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  bytes file_handle = 3;
  uint64 offset = 4;
  bytes data = 5;
}

message WriteAtResponse {
  uint32 bytes_written = 1;
}

message CloseFileRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  bytes file_handle = 3;
}

message StatResponse {
  uint32 file_type = 1; // 0=File, 1=Directory, 2=Symlink
  uint64 size = 2;
  int64 mtime = 3;
  int64 atime = 4;
  int64 ctime = 5;
  uint32 mode = 6;
  uint32 uid = 7;
  uint32 gid = 8;
  uint32 nlink = 9;
}

message ReaddirResponse {
  repeated DirEntryProto entries = 1;
}

message DirEntryProto {
  string name = 1;
  uint32 file_type = 2; // 0=File, 1=Directory, 2=Symlink
}

message CreateFileRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string path = 3;
  uint32 mode = 4;
}

message RenameRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
  string volume_id = 2;
  string from_path = 3;
  string to_path = 4;
}

message HealthCheckRequest {
  aegis.cluster.v1.SmcpNodeEnvelope envelope = 1;
}
